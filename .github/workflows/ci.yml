name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NO_COLOR: "1"
  _TYPER_FORCE_DISABLE_TERMINAL: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libavutil-dev libavformat-dev libavcodec-dev libavfilter-dev libswscale-dev libswresample-dev libavdevice-dev pkg-config

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra interactive

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy reeln/

      - name: Test
        run: uv run python -m pytest tests/ -n auto --cov=reeln --cov-branch --cov-fail-under=100 -m "not integration" -q

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libavutil-dev libavformat-dev libavcodec-dev libavfilter-dev libswscale-dev libswresample-dev libavdevice-dev pkg-config

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run python -m sphinx -W docs/ docs/_build/html
